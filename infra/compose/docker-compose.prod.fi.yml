# FI production stack (control-plane + exit). docs 06 §3.1.
# Xray + Hysteria run on the host (systemd) for raw network access; this compose
# runs the control-plane: db, redis, api, bot, sub-page, admin, workers, node-agent.
name: ghostpepe-fi

x-app: &app
  image: ghostpepe-app:latest
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile
  restart: unless-stopped
  env_file:
    - ../../.env.production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ['pgdata:/var/lib/postgresql/data']
    # NOT exposed to the internet — internal network only (docs 06 §28).
    expose: ['5432']

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    expose: ['6379']

  api:
    <<: *app
    command: npx tsx apps/api/src/index.ts
    expose: ['8080']
    ports: ['127.0.0.1:8080:8080']
    depends_on: [postgres, redis]

  bot:
    <<: *app
    command: npx tsx apps/bot/src/index.ts
    environment:
      API_BASE_URL: http://api:8080
    depends_on: [api]

  sub-page:
    <<: *app
    command: npx tsx apps/sub-page/src/index.ts
    ports: ['127.0.0.1:8082:8082']
    depends_on: [api]

  node-agent:
    <<: *app
    command: npx tsx apps/node-agent/src/index.ts
    network_mode: host          # talk to localhost Xray/Hysteria APIs
    environment:
      NODE_CODE: fi-control-01
      CONTROL_PLANE_URL: http://127.0.0.1:8080
      AGENT_MOCK: 'false'
    depends_on: [api]

  # Caddy serves admin SPA + reverse-proxies api/sub behind HAProxy (host).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ../.rendered/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../apps/admin-web/dist:/var/www/admin:ro
      - caddy_data:/data
    ports: ['127.0.0.1:8443:8443']
    depends_on: [api, sub-page]

volumes:
  pgdata:
  caddy_data:
