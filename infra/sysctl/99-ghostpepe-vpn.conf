# Ghost Pepe VPN transport tuning for mobile/LTE and long-lived tunnels.

# --- TCP (VLESS/Reality, web) ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# --- UDP / QUIC (Hysteria2) ---
# Hysteria2/QUIC needs large socket buffers; the kernel default (~208 KB) starves
# the data path and produces "client connected, tx:0, accepting stream failed:
# timeout: no recent network activity" stalls. Cap per-socket buffers at 16 MB so
# QUIC's setsockopt requests are honoured. (https://v2.hysteria.network/docs/advanced/Performance/)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
# Absorb bursts of UDP packets on busy/mobile uplinks before the app drains them.
net.core.netdev_max_backlog = 16384
